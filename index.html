<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iqra's To-Do App</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

.input-box{
display:flex;
margin-bottom:20px;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px 0 0 5px;
}

button{
padding:10px 15px;
border:none;
background:#2575fc;
color:white;
cursor:pointer;
border-radius:0 5px 5px 0;
}

ul{
padding:0;
}

li{
list-style:none;
background:#f4f4f4;
padding:10px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:5px;
}

.completed{
text-decoration:line-through;
color:gray;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>My To-Do List</h1>

<div class="input-box">
<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function renderTasks(){

let list = document.getElementById("taskList");

list.innerHTML="";

tasks.forEach((task,index)=>{

let li=document.createElement("li");

if(task.completed){
li.classList.add("completed");
}

li.innerHTML=`
<span onclick="toggleTask(${index})">${task.text}</span>
<button class="delete" onclick="deleteTask(${index})">X</button>
`;

list.appendChild(li);

});

localStorage.setItem("tasks",JSON.stringify(tasks));

}

function addTask(){

let input=document.getElementById("taskInput");

if(input.value==="") return;

tasks.push({
text:input.value,
completed:false
});

input.value="";

renderTasks();

}

function deleteTask(index){

tasks.splice(index,1);

renderTasks();

}

function toggleTask(index){

tasks[index].completed=!tasks[index].completed;

renderTasks();

}

renderTasks();

</script>

</body>
</html>
